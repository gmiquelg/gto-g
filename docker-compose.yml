services:
  app:
    build:
      context: .
    container_name: gto_g
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/gtogdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=gtoguser
      - SPRING_DATASOURCE_PASSWORD=gtogpass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    container_name: gto_g_frontend
    working_dir: /app
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "8000:8000"
    environment:
      - VITE_WATCH_USEPOLLING=true
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --performance-schema=OFF
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: gtogpass
      MYSQL_DATABASE: gtogdb
      MYSQL_USER: gtoguser
      MYSQL_PASSWORD: gtogpass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
